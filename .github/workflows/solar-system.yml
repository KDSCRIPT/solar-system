name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
    unit-testing:
        name: Unit Testing
        services:
          mongo-db:
            image: mongo:7
            ports:
              - 27017:27017
            env:
              MONGO_URI: mongodb://non-prod-user:non-prod-password@localhost:27017/superData?authSource=admin
              MONGO_INITDB_ROOT_USERNAME: non-prod-user
              MONGO_INITDB_ROOT_PASSWORD: non-prod-password
        strategy:
          matrix:
            nodejs_version: [18,20]
            operating_system: [ubuntu-latest]
            # exclude:
            #   - nodejs_version: 18
            #     operating_system: macos-latest

        runs-on: ${{ matrix.operating_system }}
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v7.0.0

        - name: Setup NodeJS Version -  ${{ matrix.nodejs_version }}
          uses: actions/setup-node@v6.4.0
          with:
            node-version: ${{ matrix.nodejs_version }}
    
        - name: Cache NPM Dependencies
          uses: actions/cache@v6.0.0
          with:
            path: node_modules
            key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
        - name: Install Dependencies
          run: npm install
    
        - name: Unit Testing
          id: nodejs-unit-testing-step
          run: npm test
          
        - name: Archive Test Result
          if: always()
          uses: actions/upload-artifact@v7.0.1
          with:
            name: Mocha-Test-Result
            path: test-results.xml
    
    code-coverage:
      name: Code Coverage
      container:
        image: node:18
      services:
        mongo-db:
          image: mongo:7
          options:
            --name mongo
          env:
            MONGO_URI: mongodb://non-prod-user:non-prod-password@mongo:27017/superData?authSource=admin
            MONGO_INITDB_ROOT_USERNAME: non-prod-user
            MONGO_INITDB_ROOT_PASSWORD: non-prod-password
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v7.0.0
        
        # - name: Setup NodeJS Version - 18
        #   uses: actions/setup-node@v6.4.0
        #   with:
        #     node-version: 18
        
        - name: Cache NPM Dependencies
          uses: actions/cache@v6.0.0
          with:
            path: node_modules
            key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

        - name: Install Dependencies
          run: npm install
        
        - name: Check Code Coverage
          continue-on-error: true
          run: npm run coverage
        
        - name: Archive Test Result
          uses: actions/upload-artifact@v7.0.1
          with:
            name: Code-coverage-Result
            path: coverage
            retention-days: 5
    
    docker:
      name: Containerization
      needs: [unit-testing,code-coverage]
      permissions: 
        packages: write
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v7.0.0
        
        - name: Dockerhub Login
          uses: docker/login-action@v4.2.0
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}
        
        - name: GHCR Login
          uses: docker/login-action@v4.2.0
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner}}
            password: ${{ secrets.GITHUB_TOKEN }}
        
        - name: Docker Build For Testing
          uses: docker/build-push-action@v7.2.0
          with:
            context: .
            push: false
            tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
        
        - name: Docker Image Testing
          run: |
            docker images
            docker run --name solar-system-app -d \
              -p 3000:3000 \
              -e MONGO_URI=$MONGO_URI \
              -e MONGO_USERNAME=$MONGO_USERNAME \
              -e MONGO_PASSWORD=$MONGO_PASSWORD \
              ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
            
            export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)
            echo $IP

            echo Testing Image URL using wget
            wget -q -O - 127.0.0.1:3000/live | grep live
        
        - name: Convert repository owner to lowercase
          run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

        - name: Container Registry Push
          uses: docker/build-push-action@v7.2.0
          with:
            context: .
            push: true
            tags: |
              ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
              ghcr.io/${{ env.OWNER_LC }}/solar-system:${{ github.sha }}
    
    dev-deploy:
      if: contains(github.ref,'feature/')
      needs: docker
      environment:
        name: development
        url: https://${{ steps.set-ingress-host-address.outputs.APP_INGRESS_HOST }}
      outputs:
        APP_INGRESS_URL: ${{ steps.set-ingress-host-address.outputs.APP_INGRESS_HOST }}
      runs-on:
        - self-hosted
        - linux

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v7.0.0

        - name: Install Kubectl CLI
          uses: Azure/setup-kubectl@v5.1.0

        - name: Set Kubeconfig
          uses: Azure/k8s-set-context@v5.0.1
          with:
            method: kubeconfig
            kubeconfig: ${{ secrets.KUBECONFIG }}

        - name: Fetch Kubernetes Cluster Details
          run: |
            kubectl version
            echo ----------------------
            kubectl get nodes

        - name: Save NGINX Ingress Controller IP
          id: save_ingress_ip
          run: |
            INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

            if [ -z "$INGRESS_IP" ]; then
              echo "Ingress IP is empty, falling back to localhost"
              INGRESS_IP="127.0.0.1"
            fi

            echo "INGRESS_IP=$INGRESS_IP" >> $GITHUB_ENV

        - name: Replace tokens in Manifest files
          uses: cschleiden/replace-tokens@v1
          with:
            tokenPrefix: '_{_'
            tokenSuffix: '_}_'
            files: '["kubernetes/development/*.yaml"]'
          env:
            NAMESPACE: ${{ vars.NAMESPACE }}
            REPLICAS: ${{ vars.REPLICAS }}
            IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
            INGRESS_IP: ${{ env.INGRESS_IP }}

        - name: Verify token replacement
          run: |
            echo "=== deployment.yaml ==="
            cat kubernetes/development/deployment.yaml
            echo "=== service.yaml ==="
            cat kubernetes/development/service.yaml
            echo "=== ingress.yaml ==="
            cat kubernetes/development/ingress.yaml
        
        - name: Create MongoDB secret
          run: |
            kubectl -n ${{ vars.NAMESPACE }} create secret generic mongo-db-creds \
              --from-literal=MONGO_URI=${{ env.MONGO_URI }} \
              --from-literal=MONGO_USERNAME=${{ env.MONGO_USERNAME }} \
              --from-literal=MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }} \
              --save-config \
              --dry-run=client \
              -o yaml | kubectl apply -f -

        - name: Deploy to Dev Env
          run: kubectl apply -f kubernetes/development

        - name: Set App Ingress Host URL
          id: set-ingress-host-address
          run: |
            echo "APP_INGRESS_HOST=$(kubectl -n development get ingress -o jsonpath='{.items[0].spec.rules[0].host}')" >> "$GITHUB_OUTPUT"
            
    dev-integration-testing:
      if: contains(github.ref,'feature/')
      name: Dev Integration Testing
      needs: dev-deploy
      runs-on:
        - self-hosted
        - linux
      steps:
        - name: Test URL Output using CURL and JQ
          env:
            URL: ${{ needs.dev-deploy.outputs.APP_INGRESS_URL }}
          run: |
            echo "URL: $URL"
            echo "-----------------------------------------"
            curl https://$URL/live -s -k | jq -r .status | grep -i live
    
    prod-deploy:
      if: github.ref == 'ref/heads/main'
      needs: docker
      # needs: dev-integration-testing
      environment:
        name: production
        url: https://${{ steps.set-ingress-host-address.outputs.APP_INGRESS_HOST }}
      outputs:
        APP_INGRESS_URL: ${{ steps.set-ingress-host-address.outputs.APP_INGRESS_HOST }}
      runs-on:
        - self-hosted
        - linux

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v7.0.0

        - name: Install Kubectl CLI
          uses: Azure/setup-kubectl@v5.1.0

        - name: Set Kubeconfig
          uses: Azure/k8s-set-context@v5.0.1
          with:
            method: kubeconfig
            kubeconfig: ${{ secrets.KUBECONFIG }}

        - name: Fetch Kubernetes Cluster Details
          run: |
            kubectl version
            echo ----------------------
            kubectl get nodes

        - name: Save NGINX Ingress Controller IP
          id: save_ingress_ip
          run: |
            INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

            if [ -z "$INGRESS_IP" ]; then
              echo "Ingress IP is empty, falling back to localhost"
              INGRESS_IP="127.0.0.1"
            fi

            echo "INGRESS_IP=$INGRESS_IP" >> $GITHUB_ENV

        - name: Replace tokens in Manifest files
          uses: cschleiden/replace-tokens@v1
          with:
            tokenPrefix: '_{_'
            tokenSuffix: '_}_'
            files: '["kubernetes/production/*.yaml"]'
          env:
            NAMESPACE: ${{ vars.NAMESPACE }}
            REPLICAS: ${{ vars.REPLICAS }}
            IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
            INGRESS_IP: ${{ env.INGRESS_IP }}

        - name: Verify token replacement
          run: |
            echo "=== deployment.yaml ==="
            cat kubernetes/development/deployment.yaml
            echo "=== service.yaml ==="
            cat kubernetes/development/service.yaml
            echo "=== ingress.yaml ==="
            cat kubernetes/development/ingress.yaml
        
        - name: Create MongoDB secret
          run: |
            kubectl -n ${{ vars.NAMESPACE }} create secret generic mongo-db-creds \
              --from-literal=MONGO_URI=${{ env.MONGO_URI }} \
              --from-literal=MONGO_USERNAME=${{ env.MONGO_USERNAME }} \
              --from-literal=MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }} \
              --save-config \
              --dry-run=client \
              -o yaml | kubectl apply -f -

        - name: Deploy to Prod Env
          run: kubectl apply -f kubernetes/production

        - name: Set App Ingress Host URL
          id: set-ingress-host-address
          run: |
            echo "APP_INGRESS_HOST=$(kubectl -n production get ingress -o jsonpath='{.items[0].spec.rules[0].host}')" >> "$GITHUB_OUTPUT"
    
    prod-integration-testing:
      if: github.ref == 'ref/heads/main'
      name: Prod Integration Testing
      needs: prod-deploy
      runs-on:
        - self-hosted
        - linux
      steps:
        - name: Test URL Output using CURL and JQ
          env:
            URL: ${{ needs.prod-deploy.outputs.APP_INGRESS_URL }}
          run: |
            echo "URL: $URL"
            echo "-----------------------------------------"
            curl https://$URL/live -s -k | jq -r .status | grep -i live